name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.2 # Robotun eski sürümü kullanmasını yasaklıyoruz!

      - name: Build APK
        run: gradle assembleDebug --stacktrace # gradlew yerine doğrudan sistem gradlesini kullanıyoruz
